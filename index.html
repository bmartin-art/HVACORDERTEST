<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Brookstone Industries HVAC Takeoff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--teal:#2BA87E;--teal-dk:#1a8060;--bg:#1c2b3a;--card:#fff;--border:#e0e0e0;--txt:#222;--sub:#666;--lbl:#888}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform}
#palletScreen{transform:translateX(0)}
#detailScreen{transform:translateX(100%)}
.screen.slide-in{transform:translateX(0)!important}
.screen.slide-out{transform:translateX(-40%)!important}

/* ── HEADER ── */
.hdr{background:var(--teal);color:#fff;display:flex;align-items:center;gap:10px;padding:12px 14px;flex-shrink:0;min-height:54px}
.hdr h1{font-size:17px;font-weight:700;flex:1}
.hdr .back-btn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.hdr .list-btn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hdr .list-count{background:#fff;color:var(--teal);border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700}

/* ── JOB INFO BAR ── */
.job-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px;flex-shrink:0}
.jf{display:flex;flex-direction:column;gap:2px}
.jf label{font-size:10px;color:var(--lbl);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.jf input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px;outline:none}
.jf input:focus{border-color:var(--teal)}

/* ── PALLET GRID ── */
.pallet-scroll{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pi{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:8px 4px 6px;text-align:center;cursor:pointer;active-scale:.95;transition:border-color .12s,transform .1s}
.pi:active{transform:scale(.94)}
.pi.on{border-color:var(--teal);background:rgba(43,168,126,.07)}
.pi img{width:44px;height:44px;display:block;margin:0 auto 4px;image-rendering:pixelated}
.pi .pname{font-size:9px;color:var(--sub);line-height:1.2;font-weight:500}
.pi .pimg-placeholder{width:44px;height:44px;background:#eee;border-radius:5px;margin:0 auto 4px}

/* ── DETAIL SCREEN ── */
#detailScreen{background:var(--bg)}
.vp-wrap{flex:1;position:relative;min-height:0}
#cv3d{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
#cv3d:active{cursor:grabbing}
#lv{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.vp-name{position:absolute;top:8px;left:0;right:0;text-align:center;font-size:12px;font-weight:600;color:rgba(190,225,240,.9);pointer-events:none}
.vp-hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:rgba(100,150,170,.4);pointer-events:none}

/* ── DIM PANEL ── */
.dim-panel{background:#fff;border-top-left-radius:16px;border-top-right-radius:16px;box-shadow:0 -3px 20px rgba(0,0,0,.15);flex-shrink:0;max-height:46vh;display:flex;flex-direction:column;overflow:hidden}
.dim-panel-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:8px auto 2px;flex-shrink:0}
.vtabs-row{display:flex;gap:8px;padding:4px 12px 6px;flex-shrink:0;flex-wrap:wrap}
.vt-btn{background:#f0f0f0;border:none;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--sub)}
.vt-btn.on{background:var(--teal);color:#fff;font-weight:600}
.dim-scroll{overflow-y:auto;flex:1;padding:0 10px 6px;-webkit-overflow-scrolling:touch}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.df{display:flex;flex-direction:column;gap:2px}
.df label{font-size:10px;color:var(--lbl);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.df input,.df select{padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:#fff}
.df input:focus,.df select:focus{border-color:var(--teal)}
.add-row{display:flex;gap:8px;padding:8px 10px;border-top:1px solid #eee;flex-shrink:0;align-items:center}
.qty-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.qty-wrap label{font-size:10px;color:var(--lbl);font-weight:600;text-transform:uppercase}
.qty-wrap input{width:54px;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;text-align:center;outline:none}
.qty-wrap input:focus{border-color:var(--teal)}
.btn-add{flex:1;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-add:active{background:var(--teal-dk)}
.notes-wrap{padding:0 10px 6px;flex-shrink:0}
.notes-wrap input{width:100%;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.notes-wrap input:focus{border-color:var(--teal)}

/* ── SLIDE-UP LIST PANEL ── */
#listOverlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:flex-end}
#listOverlay.open{display:flex}
#listSheet{background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-height:82vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 6px}
.sheet-hdr{display:flex;align-items:center;padding:0 14px 10px;border-bottom:1px solid #eee;gap:8px}
.sheet-hdr h2{flex:1;font-size:16px;font-weight:700}
.sheet-hdr .close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#999}
.list-scroll{overflow-y:auto;flex:1;padding:8px 12px;-webkit-overflow-scrolling:touch}
.li{background:#f8f8f8;border:1px solid #eee;border-radius:10px;padding:10px 38px 10px 12px;margin-bottom:8px;position:relative}
.li .ln{font-size:13px;font-weight:600;color:#222}
.li .ld{font-size:11px;color:#888;margin-top:3px;word-break:break-all}
.li .lr{position:absolute;top:8px;right:10px;background:none;border:none;color:#ccc;font-size:18px;cursor:pointer}
.li .lr:active{color:#c22}
.li{cursor:pointer;display:flex;align-items:center;gap:10px}
.li-thumb{width:54px;height:54px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#1c2b3a}
.li-thumb-ph{width:54px;height:54px;border-radius:8px;background:#e8e8e8;flex-shrink:0}
.li-body{flex:1;min-width:0}
.empty-msg{text-align:center;color:#bbb;font-size:13px;padding:24px}
.sheet-btm{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #eee;flex-shrink:0}
.sheet-btm button{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#fff}
.sheet-btm .bp{background:var(--teal);color:#fff;border-color:var(--teal)}
/* ── SEND MODAL ── */
#sendModal{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:60;display:none;align-items:flex-end}
#sendModal.open{display:flex}
#sendSheet{background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-height:90vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.send-body{overflow-y:auto;flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.send-field{display:flex;flex-direction:column;gap:4px}
.send-field label{font-size:11px;font-weight:700;color:var(--lbl);text-transform:uppercase;letter-spacing:.04em}
.send-field input{padding:9px 10px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;outline:none}
.send-field input:focus{border-color:var(--teal)}
.photo-attach-area{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:var(--sub);font-size:13px;position:relative;transition:border-color .15s}
.photo-attach-area.has-photo{border-color:var(--teal);background:rgba(43,168,126,.05)}
.photo-attach-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border)}
.photo-rm{position:relative;display:inline-block}
.photo-rm-btn{position:absolute;top:-5px;right:-5px;background:#c22;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.send-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #eee;flex-shrink:0}
.send-actions button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff}
.send-actions .send-btn{background:var(--teal);color:#fff;border-color:var(--teal)}
.send-actions .send-btn:active{background:var(--teal-dk)}
.attach-list-btn{background:var(--teal);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>

<!-- ══ PALLET SCREEN ══ -->
<div class="screen" id="palletScreen">
  <div class="hdr">
    <h1>Brookstone Industries</h1>
    <button class="attach-list-btn" onclick="openSend()">📤 Send</button>
    <button class="list-btn" onclick="openList()">📋 List <span class="list-count" id="lCount">0</span></button>
  </div>
  <div class="job-bar">
    <div class="jf"><label>Job</label><input id="jName" placeholder="Job name"></div>
    <div class="jf"><label>Tech</label><input id="jTech" placeholder="Your name"></div>
    <div class="jf"><label>Date</label><input id="jDate" type="date"></div>
    <div class="jf"><label>Zone</label><input id="jZone" placeholder="e.g. 2nd floor"></div>
  </div>
  <div class="pallet-scroll">
    <div class="pgrid" id="pallet"></div>
  </div>
</div>

<!-- ══ DETAIL SCREEN ══ -->
<div class="screen" id="detailScreen">
  <div class="hdr">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h1 id="vpName" style="font-size:15px">Select fitting</h1>
    <button class="list-btn" onclick="openList()">📋 <span class="list-count" id="lCount2">0</span></button>
  </div>
  <div class="vp-wrap" id="vp">
    <canvas id="cv3d"></canvas>
    <canvas id="lv" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></canvas>
    <div class="vp-name" id="vpLabel"></div>
    <div class="vp-hint">drag to rotate · pinch to zoom</div>
  </div>
  <div class="dim-panel" id="dimPanel">
    <div class="dim-panel-handle"></div>
    <div class="vtabs-row" id="vtabs"></div>
    <div class="dim-scroll">
      <div class="dgrid" id="dgrid"></div>
    </div>
    <div class="notes-wrap"><input id="iNotes" placeholder="Notes (insulated, double wall…)"></div>
    <div class="add-row">
      <div class="qty-wrap"><label>Qty</label><input id="iQty" type="number" value="1" min="1"></div>
      <button class="btn-add" id="btnAdd" onclick="addItem()">+ Add to List</button>
    </div>
  </div>
</div>

<!-- ══ LIST SLIDE-UP ══ -->
<div id="listOverlay" onclick="closeListIfBg(event)">
  <div id="listSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <h2>Takeoff List (<span id="lCount3">0</span>)</h2>
      <button class="close-btn" onclick="closeList()">×</button>
    </div>
    <div class="list-scroll" id="listArea"></div>
    <div class="sheet-btm">
      <button onclick="copyList()">📋 Copy</button>
      <button onclick="exportPDF()">⬇ PDF</button>
      <button class="bp" onclick="openSend()">📤 Send</button>
    </div>
  </div>
</div>

<!-- ══ SEND MODAL ══ -->
<div id="sendModal" onclick="closeSendIfBg(event)">
  <div id="sendSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <h2>📤 Send to Brookstone</h2>
      <button class="close-btn" onclick="closeSend()">×</button>
    </div>
    <div class="send-body">
      <div class="send-field">
        <label>To</label>
        <input value="sales@brookstoneind.com" readonly style="color:#888;background:#f8f8f8">
      </div>
      <div class="send-field">
        <label>CC (optional)</label>
        <input id="sendCC" type="email" placeholder="your@email.com">
      </div>
      <div class="send-field">
        <label>Message (optional)</label>
        <input id="sendMsg" placeholder="Any special instructions…">
      </div>
      <div class="send-field">
        <label>Attach handwritten list (optional)</label>
        <div class="photo-attach-area" id="photoArea">
          <input type="file" accept="image/*" multiple onchange="handlePhotos(this)">
          <div id="photoPrompt">📷 Tap to attach photo(s) of handwritten list</div>
          <div class="photo-thumb-row" id="photoThumbs"></div>
        </div>
      </div>
    </div>
    <div class="send-actions">
      <button onclick="closeSend()">Cancel</button>
      <button class="send-btn" onclick="doSend()">Send ✉</button>
    </div>
  </div>
</div>

// ── WEBGL SETUP ────────────────────────────────────────────────────
const cv=document.getElementById('cv3d');
const vp=document.getElementById('vp');
let gl,prog,uMVP,glBuf=null,glVC=0;
let rX=0.35,rY=0.62,camR=2,drag=false,mx=0,my=0;
const camTgt=[0,0,0];

function initGL(){
  const W=vp.clientWidth,H=vp.clientHeight;
  cv.width=W;cv.height=H;
  gl=cv.getContext('webgl',{antialias:true,depth:true,preserveDrawingBuffer:true});
  if(!gl) return false;
  gl.clearColor(.11,.169,.227,1);
  gl.enable(gl.DEPTH_TEST);
  gl.disable(gl.CULL_FACE);
  const VS=`attribute vec3 p;attribute vec3 n;uniform mat4 mvp;varying vec3 vn;void main(){gl_Position=mvp*vec4(p,1.);vn=n;}`;
  const FS=`precision mediump float;varying vec3 vn;void main(){vec3 n=normalize(vn);float d=0.38+max(0.,dot(n,normalize(vec3(2.,4.,3.))))*0.88+max(0.,dot(-n,normalize(vec3(2.,4.,3.))))*0.22+max(0.,dot(n,normalize(vec3(-2.,1.,-2.))))*0.18;gl_FragColor=vec4(vec3(.071,.706,.776)*clamp(d,0.,1.),1.);}`;
  function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}
  prog=gl.createProgram();
  gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS));
  gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  uMVP=gl.getUniformLocation(prog,'mvp');
  return true;
}

function persp(fov,asp,n,f){const t=1/Math.tan(fov/2);return new Float32Array([t/asp,0,0,0,0,t,0,0,0,0,(f+n)/(n-f),-1,0,0,2*f*n/(n-f),0]);}
function lookAt(ex,ey,ez,cx,cy,cz){
  let fx=cx-ex,fy=cy-ey,fz=cz-ez;const fl=Math.sqrt(fx*fx+fy*fy+fz*fz);fx/=fl;fy/=fl;fz/=fl;
  let rx=-fz,ry=0,rz=fx;const rl=Math.sqrt(rx*rx+rz*rz)||1;rx/=rl;rz/=rl;
  const ux=ry*fz-rz*fy,uy=rz*fx-rx*fz,uz=rx*fy-ry*fx;
  return new Float32Array([rx,ux,-fx,0,ry,uy,-fy,0,rz,uz,-fz,0,-(rx*ex+ry*ey+rz*ez),-(ux*ex+uy*ey+uz*ez),(fx*ex+fy*ey+fz*ez),1]);
}
function m4mul(a,b){const r=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++){let s=0;for(let k=0;k<4;k++)s+=a[i+k*4]*b[k+j*4];r[i+j*4]=s;}return r;}
function eyePos(){return[camTgt[0]+camR*Math.sin(rY)*Math.cos(rX),camTgt[1]+camR*Math.sin(rX),camTgt[2]+camR*Math.cos(rY)*Math.cos(rX)];}

function render3d(){
  if(!gl||!glBuf) return;
  gl.viewport(0,0,cv.width,cv.height);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  const[ex,ey,ez]=eyePos();
  const mvp=m4mul(persp(0.733,cv.width/cv.height,camR*.001,camR*100),lookAt(ex,ey,ez,...camTgt));
  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.bindBuffer(gl.ARRAY_BUFFER,glBuf);
  const ap=gl.getAttribLocation(prog,'p'),an=gl.getAttribLocation(prog,'n');
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,24,0);
  gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,24,12);
  gl.drawArrays(gl.TRIANGLES,0,glVC);
}

function uploadGeom(pos){
  const data=[];
  for(let i=0;i<pos.length;i+=9){
    const ax=pos[i+3]-pos[i],ay=pos[i+4]-pos[i+1],az=pos[i+5]-pos[i+2];
    const bx=pos[i+6]-pos[i],by=pos[i+7]-pos[i+1],bz=pos[i+8]-pos[i+2];
    let nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
    const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;nx/=l;ny/=l;nz/=l;
    for(let j=0;j<3;j++) data.push(pos[i+j*3],pos[i+j*3+1],pos[i+j*3+2],nx,ny,nz);
  }
  if(glBuf) gl.deleteBuffer(glBuf);
  glBuf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,glBuf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(data),gl.STATIC_DRAW);
  glVC=pos.length/3;
  // auto-fit
  let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9,z0=1e9,z1=-1e9;
  for(let i=0;i<pos.length;i+=3){
    x0=Math.min(x0,pos[i]);x1=Math.max(x1,pos[i]);
    y0=Math.min(y0,pos[i+1]);y1=Math.max(y1,pos[i+1]);
    z0=Math.min(z0,pos[i+2]);z1=Math.max(z1,pos[i+2]);
  }
  camTgt[0]=(x0+x1)/2;camTgt[1]=(y0+y1)/2;camTgt[2]=(z0+z1)/2;
  camR=Math.max(x1-x0,y1-y0,z1-z0)*1.85;
  window.geoBB={x0,x1,y0,y1,z0,z1,cx:(x0+x1)/2,cy:(y0+y1)/2,cz:(z0+z1)/2};
  rX=0.35;rY=0.62;
  document.getElementById('vpEmpty').style.display='none';
}


// ── LABEL OVERLAY ───────────────────────────────────────
const lv=document.getElementById('lv');
const lctx=lv.getContext('2d');
let curLabels=[];

function project3D(x,y,z,mvp,w,h){
  const ix=mvp[0]*x+mvp[4]*y+mvp[8]*z+mvp[12];
  const iy=mvp[1]*x+mvp[5]*y+mvp[9]*z+mvp[13];
  const iw=mvp[3]*x+mvp[7]*y+mvp[11]*z+mvp[15];
  if(Math.abs(iw)<0.001)return null;
  return [(ix/iw+1)*0.5*w,(1-iy/iw)*0.5*h];
}

function drawLabels(){
  lv.width=cv.offsetWidth||cv.clientWidth;
  lv.height=cv.offsetHeight||cv.clientHeight;
  lctx.clearRect(0,0,lv.width,lv.height);
  if(!curLabels.length||!glBuf)return;
  const[ex,ey,ez]=eyePos();
  const mvp=m4mul(persp(0.733,lv.width/lv.height,camR*.001,camR*100),lookAt(ex,ey,ez,...camTgt));

  curLabels.forEach(lb=>{
    // lb.anchor = 3D point on the fitting surface
    // lb.label  = 3D point where the label box sits (further out)
    const pa=project3D(lb.ax,lb.ay,lb.az,mvp,lv.width,lv.height);
    const pl=project3D(lb.lx,lb.ly,lb.lz,mvp,lv.width,lv.height);
    if(!pa||!pl)return;

    // Draw dimension line from anchor to label
    lctx.strokeStyle='rgba(255,220,80,0.85)';
    lctx.lineWidth=1.5;
    lctx.setLineDash([4,3]);
    lctx.beginPath();
    lctx.moveTo(pa[0],pa[1]);
    lctx.lineTo(pl[0],pl[1]);
    lctx.stroke();
    lctx.setLineDash([]);

    // Small dot at anchor point
    lctx.fillStyle='rgba(255,220,80,0.9)';
    lctx.beginPath();
    lctx.arc(pa[0],pa[1],3,0,Math.PI*2);
    lctx.fill();

    // Label box at label point
    lctx.font='bold 12px sans-serif';
    lctx.textAlign='left';
    const text=lb.text;
    const tw=lctx.measureText(text).width;
    const bx=pl[0]+4, by=pl[1]-8;
    lctx.fillStyle='rgba(10,25,45,0.82)';
    lctx.strokeStyle='rgba(255,220,80,0.6)';
    lctx.lineWidth=1;
    lctx.beginPath();
    lctx.roundRect(bx-3,by-2,tw+8,18,3);
    lctx.fill();
    lctx.stroke();
    lctx.fillStyle='#ffe04a';
    lctx.fillText(text,bx+1,by+12);
  });
}

// ── GEOMETRY HELPERS ────────────────────────────────────────────────
const S=1/12;
function qd(v,a,b,c,d){v.push(...a,...b,...c,...a,...c,...d);}
function tri(v,a,b,c){v.push(...a,...b,...c);}

function obox(x0,x1,y0,y1,z0,z1,sk){
  const v=[],s=sk||[];
  if(!s.includes('top'))   qd(v,[x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]);
  if(!s.includes('bot'))   qd(v,[x0,y0,z1],[x1,y0,z1],[x1,y0,z0],[x0,y0,z0]);
  if(!s.includes('front')) qd(v,[x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1]);
  if(!s.includes('back'))  qd(v,[x1,y0,z0],[x0,y0,z0],[x0,y1,z0],[x1,y1,z0]);
  if(!s.includes('left'))  qd(v,[x0,y0,z0],[x0,y0,z1],[x0,y1,z1],[x0,y1,z0]);
  if(!s.includes('right')) qd(v,[x1,y0,z1],[x1,y0,z0],[x1,y1,z0],[x1,y1,z1]);
  return v;
}

function elbow(A,B,Ri,a0,a1,lI,lO){
  // Arc sweeps in XY plane; Z is the depth (front-to-back) axis.
  // Inlet at 180° → points left (-X). Outlet at 270° → points down (-Y). 
  const Ro=Ri+A,hB=B/2,steps=52,v=[];
  const angs=[];for(let i=0;i<=steps;i++)angs.push((a0+(a1-a0)*i/steps)*Math.PI/180);
  for(let i=0;i<steps;i++){
    const c0=Math.cos(angs[i]),s0=Math.sin(angs[i]),c1=Math.cos(angs[i+1]),s1=Math.sin(angs[i+1]);
    // outer wall, inner wall, front (z=+hB), back (z=-hB)
    qd(v,[Ro*c0,Ro*s0,hB],[Ro*c1,Ro*s1,hB],[Ro*c1,Ro*s1,-hB],[Ro*c0,Ro*s0,-hB]);
    qd(v,[Ri*c1,Ri*s1,hB],[Ri*c0,Ri*s0,hB],[Ri*c0,Ri*s0,-hB],[Ri*c1,Ri*s1,-hB]);
    qd(v,[Ri*c0,Ri*s0,hB],[Ri*c1,Ri*s1,hB],[Ro*c1,Ro*s1,hB],[Ro*c0,Ro*s0,hB]);
    qd(v,[Ro*c0,Ro*s0,-hB],[Ro*c1,Ro*s1,-hB],[Ri*c1,Ri*s1,-hB],[Ri*c0,Ri*s0,-hB]);
  }
  // Arc ends OPEN — no caps (hollow duct)
  // Straight extension legs
  [[a0,lI],[a1,lO]].forEach(([ad,L])=>{
    if(!L)return;
    const ar=ad*Math.PI/180;
    const rawDx=Math.cos(ar),rawDy=Math.sin(ar);
    const hw=A/2;
    if(Math.abs(rawDx)>Math.abs(rawDy)){
      // Horizontal leg
      const dx=rawDx>0?1:-1;
      const xs=Ro*rawDx, xe=xs+dx*L;
      const x0=Math.min(xs,xe),x1=Math.max(xs,xe);
      // Y centered on arc opening midpoint (Rm*rawDy)
      const yc=((Ri+Ro)/2)*rawDy;
      v.push(...obox(x0,x1,yc-hw,yc+hw,-hB,hB,['left','right']));
    } else {
      // Vertical leg
      const dy=rawDy>0?1:-1;
      const ys=Ro*rawDy, ye=ys+dy*L;
      const y0=Math.min(ys,ye),y1=Math.max(ys,ye);
      // X centered on arc opening midpoint (Rm*rawDx)
      const xc=((Ri+Ro)/2)*rawDx;
      v.push(...obox(xc-hw,xc+hw,y0,y1,-hB,hB,['top','bot']));
    }
  });
  return v;
}

function buildGooseneck(A,B,Ri,angleDeg,lI){
  // Geometry reverse-engineered from CamDuct XGL data.
  // Arc center at (-(Ri+A/2), 0). Arc sweeps CCW from 0° to angleDeg.
  // Inlet stub goes straight DOWN (-Y) from arc start face.
  // Outlet extension removed for now.
  const Ro=Ri+A, hB=B/2, steps=64;
  const sweep=angleDeg*Math.PI/180;
  const acx=-(Ri+A/2), acy=0;
  const v=[];

  function qd2(v,a,b,c,d){v.push(...a,...b,...c,...a,...c,...d);}

  // Arc body
  for(let i=0;i<steps;i++){
    const t0=sweep*i/steps, t1=sweep*(i+1)/steps;
    const c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1);
    const oi0=[acx+Ro*c0,acy+Ro*s0], oi1=[acx+Ro*c1,acy+Ro*s1];
    const ii0=[acx+Ri*c0,acy+Ri*s0], ii1=[acx+Ri*c1,acy+Ri*s1];
    qd2(v,[...oi0,hB],[...oi1,hB],[...oi1,-hB],[...oi0,-hB]);
    qd2(v,[...ii1,hB],[...ii0,hB],[...ii0,-hB],[...ii1,-hB]);
    qd2(v,[...ii0,hB],[...ii1,hB],[...oi1,hB],[...oi0,hB]);
    qd2(v,[...oi0,-hB],[...oi1,-hB],[...ii1,-hB],[...ii0,-hB]);
  }

  // Arc end caps
  qd2(v,[acx+Ro,acy,hB],[acx+Ri,acy,hB],[acx+Ri,acy,-hB],[acx+Ro,acy,-hB]);
  const ca=Math.cos(sweep),sa=Math.sin(sweep);
  const oex=acx+Ro*ca,oey=acy+Ro*sa,iex=acx+Ri*ca,iey=acy+Ri*sa;
  qd2(v,[iex,iey,hB],[oex,oey,hB],[oex,oey,-hB],[iex,iey,-hB]);

  // Inlet stub: straight DOWN (-Y) from arc start
  if(lI>0){
    const ix=acx+Ri, ox=acx+Ro, sy=acy;
    qd2(v,[ox,sy,hB],[ox,sy-lI,hB],[ox,sy-lI,-hB],[ox,sy,-hB]); // outer wall +X
    qd2(v,[ix,sy,-hB],[ix,sy-lI,-hB],[ix,sy-lI,hB],[ix,sy,hB]); // inner wall -X
    qd2(v,[ix,sy,hB],[ix,sy-lI,hB],[ox,sy-lI,hB],[ox,sy,hB]);   // front z=+hB
    qd2(v,[ox,sy,-hB],[ox,sy-lI,-hB],[ix,sy-lI,-hB],[ix,sy,-hB]); // back z=-hB
    qd2(v,[ix,sy-lI,hB],[ix,sy-lI,-hB],[ox,sy-lI,-hB],[ox,sy-lI,hB]); // bottom cap
  }

  return v;
}

// ── FITTING GEOMETRY BUILDERS ───────────────────────────────────────
function buildFitting(id,variant,dv){
  const A=dv.A||24,B=dv.B||12,C=dv.C||48,D=dv.D||90,E=dv.E||0,F=dv.F||0,G=dv.G||0;
  const as=A*S,bs=B*S,cs=C*S;
  let v=[];

  if(id==='e90'||id==='e45'||id==='ev'){
    let Ri=(variant==='lr'?A*1.5:A*0.5)*S;if(G>0)Ri=G*S;
    v=elbow(as,bs,Ri,180,180+D,E*S,F*S);
  }
  else if(id==='rgn'){
    let Ri=(variant==='lr'?A*1.5:A*0.5)*S;if(G>0)Ri=G*S;
    v=buildGooseneck(as,bs,Ri,D,E*S);
  }
  else if(id==='sqe'){
    // Square elbow: L-shaped duct
    // A=Width, B=Depth, C=Btm Width
    // D=Top Throat: straight run length on horizontal arm (does NOT change duct size)
    // E=Btm Throat: straight run length on vertical arm
    //
    // The duct cross-section is always A wide × B deep
    // D adds a straight horizontal section before the 90° turn
    // E adds a straight vertical section after the turn
    //
    // Layout (front view), corner at origin:
    //   Horizontal arm: x = -(A+D) to 0,  y = 0 to A   (inlet at x=-(A+D), open)
    //   Vertical arm:   x = 0 to C,        y = -(C+E) to 0  (outlet at y=-(C+E), open)
    //   The turn occupies the corner box x=0..C, y=0..A (no — that's not right either)
    //
    // Actually for a square elbow:
    //   Both legs are the SAME width (A). C=Btm Width can differ.
    //   Horizontal leg: runs left, width=A (y=0..A), D = straight run length before turn
    //   Vertical leg: runs down, width=C (x=0..C), E = straight run length after turn
    //   Inner corner is at (0, 0)
    //   Outer corner is at (C, A)
    //   Inlet: x=-(D), open face, height=A (y=0..A)  — just the straight section
    //   Turn: the corner box from x=0..C, y=0..A
    //   Outlet: y=-(E), open face, width=C (x=0..C)  — just the straight section

    const hb=bs/2;
    const cw=C*S;
    const dt=(dv.D||6)*S;   // Top Throat — horiz straight run length
    const de=(dv.E||6)*S;   // Btm Throat — vert straight run length

    // Key x/y positions:
    const xInlet=-(dt);      // inlet face (left end of horiz straight)
    const yOutlet=-(de);     // outlet face (bottom of vert straight)
    // Corner spans: horiz arm y=0..as, vert arm x=0..cw
    // Total front face = L-shape with corner

    // ── OUTER WALLS ──
    // Top wall (y=as): from inlet xInlet to right outer cw
    qd(v,[xInlet,as,-hb],[cw,as,-hb],[cw,as,hb],[xInlet,as,hb]);
    // Right wall (x=cw): from top as down to outlet yOutlet
    qd(v,[cw,yOutlet,-hb],[cw,as,-hb],[cw,as,hb],[cw,yOutlet,hb]);
    // Outlet bottom (y=yOutlet): OPEN — skip
    // Inlet left (x=xInlet): OPEN — skip

    // ── INNER WALLS (the L inner corner) ──
    // Horiz inner wall (y=0): from inlet to inner corner x=0
    qd(v,[xInlet,0,-hb],[0,0,-hb],[0,0,hb],[xInlet,0,hb]);
    // Vert inner wall (x=0): from inner corner y=0 down to outlet
    qd(v,[0,yOutlet,-hb],[0,0,-hb],[0,0,hb],[0,yOutlet,hb]);

    // ── FRONT face (z=-hb): L-shape ──
    // Horiz arm + corner top: xInlet..cw, y=0..as
    v.push(xInlet,0,-hb, xInlet,as,-hb, cw,as,-hb,
           xInlet,0,-hb, cw,as,-hb,     cw,0,-hb);
    // Vert arm below corner: x=0..cw, y=yOutlet..0
    v.push(0,yOutlet,-hb, 0,0,-hb, cw,0,-hb,
           0,yOutlet,-hb, cw,0,-hb, cw,yOutlet,-hb);

    // ── BACK face (z=+hb): reversed winding ──
    v.push(xInlet,as,hb, xInlet,0,hb, cw,0,hb,
           xInlet,as,hb, cw,0,hb,     cw,as,hb);
    v.push(0,0,hb, 0,yOutlet,hb, cw,yOutlet,hb,
           0,0,hb, cw,yOutlet,hb, cw,0,hb);
  }
    else if(id==='me'){
    // Mitered Elbow — identical to sq elbow but with optional miter cut on inlet
    // A=Width, B=Depth, C=Btm Width
    // D=Top Throat (horiz straight run length)
    // E=Btm Throat (vert straight run length)
    // F=Miter Angle (degrees, 0=square cut, positive=mitered cut on inlet face)
    const hb=bs/2;
    const cw=C*S;
    const dt=(dv.D||6)*S;   // Top Throat — horiz run length
    const de=(dv.E||6)*S;   // Btm Throat — vert run length
    const mAngle=(dv.F||0); // Miter angle in degrees
    const mRad=mAngle*Math.PI/180;
    // Miter offset: how much the inlet face is slanted
    // At y=0 (bottom of inlet) the face is at x=xInlet
    // At y=as (top of inlet) the face is at x=xInlet + miterOffset
    const mOff=-(as*Math.tan(mRad)); // miter goes outward (top of inlet further left)

    const xInlet=-(dt);      // inlet face base x (bottom of inlet)
    const xInletTop=-(dt)+mOff; // inlet face top x (top of inlet, mitered)
    const yOutlet=-(de);     // outlet face y

    // ── OUTER WALLS ──
    // Top wall (y=as): from inlet top to right outer cw
    // With miter, inlet top corner is at (xInletTop, as)
    qd(v,[xInletTop,as,-hb],[cw,as,-hb],[cw,as,hb],[xInletTop,as,hb]);
    // Right wall (x=cw)
    qd(v,[cw,yOutlet,-hb],[cw,as,-hb],[cw,as,hb],[cw,yOutlet,hb]);

    // ── INNER WALLS ──
    // Horiz inner wall (y=0): from inlet base to inner corner
    qd(v,[xInlet,0,-hb],[0,0,-hb],[0,0,hb],[xInlet,0,hb]);
    // Vert inner wall (x=0): from inner corner down to outlet
    qd(v,[0,yOutlet,-hb],[0,0,-hb],[0,0,hb],[0,yOutlet,hb]);

    // ── MITER FACE (inlet) — if angle > 0, angled face; else flat ──
    if(mAngle>0){
      // Angled inlet face: quad from (xInlet,0) to (xInletTop,as)
      qd(v,[xInlet,0,hb],[xInlet,0,-hb],[xInletTop,as,-hb],[xInletTop,as,hb]);
    }
    // (if mAngle=0, inlet is open — no face needed, same as sqe)

    // ── FRONT face (z=-hb): L-shape ──
    // Horiz arm + corner: from inlet to cw, y=0..as
    v.push(xInlet,0,-hb, xInletTop,as,-hb, cw,as,-hb,
           xInlet,0,-hb, cw,as,-hb,        cw,0,-hb);
    // Vert arm: x=0..cw, y=yOutlet..0
    v.push(0,yOutlet,-hb, 0,0,-hb, cw,0,-hb,
           0,yOutlet,-hb, cw,0,-hb, cw,yOutlet,-hb);

    // ── BACK face (z=+hb): reversed winding ──
    v.push(xInletTop,as,hb, xInlet,0,hb, cw,0,hb,
           xInletTop,as,hb, cw,0,hb,     cw,as,hb);
    v.push(0,0,hb, 0,yOutlet,hb, cw,yOutlet,hb,
           0,0,hb, cw,yOutlet,hb, cw,0,hb);
  }
  else if(id==='st'){
    v=obox(-cs/2,cs/2,-bs/2,bs/2,-as/2,as/2,['left','right']);
  }
  else if(id==='tr'){
    // Transition: bottom rect (A×B) → top rect (C×Dp) over length E
    // H param controls horizontal (left/right) alignment: 0=central,1=flat right,2=flat left
    // I param controls depth (top/down) alignment: 0=central,1=flat top,2=flat bottom
    // F=bottom straight extension, G=top straight extension
    const hA=as/2, hB2=bs/2;
    const hC=(dv.C||20)*S/2, hDp=(dv.Dp||10)*S/2;
    const lE=(dv.E||16)*S, lF=(dv.F||0)*S, lG=(dv.G||0)*S;
    // H=Left In alignment (horizontal/X): Central, Flat Right, Flat Left
    // For our DB variant: no variant stored, use H dim directly
    // Default: Central (both centered on X=0)
    // Flat Right: bottom left = top left → top shifts right
    // Flat Left:  bottom right = top right → top shifts left
    const Hmode = Math.round(dv.H||0); // 0=Central,1=FlatRight,2=FlatLeft
    const Imode = Math.round(dv.I||0); // 0=Central,1=FlatTop,2=FlatBottom
    const hOff=(dv.HV||0)*S; // manual horizontal offset of top rect
    const iOff=(dv.IV||0)*S; // manual vertical/depth offset of top rect
    // Bottom corners (centered on origin)
    let bx0=-hA, bx1=hA, bz0=-hB2, bz1=hB2;
    // Top corners: start centered, then apply alignment + manual offset
    let tx0=-hC+hOff, tx1=hC+hOff, tz0=-hDp+iOff, tz1=hDp+iOff;
    // Apply H alignment (overrides centering for that axis)
    if(Hmode===1){tx0=bx0; tx1=bx0+hC*2;}       // Flat Right: left edges align
    if(Hmode===2){tx1=bx1; tx0=bx1-hC*2;}       // Flat Left: right edges align
    // Apply I alignment
    if(Imode===1){tz1=bz1; tz0=bz1-hDp*2;}      // Flat Top: top(front) edges align
    if(Imode===2){tz0=bz0; tz1=bz0+hDp*2;}      // Flat Bottom: bottom(back) edges align
    const y0=0, y1=lE;
    // Bottom straight (F)
    if(lF>0){
      qd(v,[bx0,y0,bz1],[bx1,y0,bz1],[bx1,y0-lF,bz1],[bx0,y0-lF,bz1]); // front
      qd(v,[bx0,y0-lF,bz0],[bx1,y0-lF,bz0],[bx1,y0,bz0],[bx0,y0,bz0]); // back
      qd(v,[bx0,y0-lF,bz0],[bx0,y0-lF,bz1],[bx0,y0,bz1],[bx0,y0,bz0]); // left
      qd(v,[bx1,y0,bz0],[bx1,y0,bz1],[bx1,y0-lF,bz1],[bx1,y0-lF,bz0]); // right
      // bottom cap OPEN — inlet
    }
    // Transition body — 4 trapezoidal walls + caps
    // Front wall (z=top)
    qd(v,[bx0,y0,bz1],[bx1,y0,bz1],[tx1,y1,tz1],[tx0,y1,tz1]);
    // Back wall (z=bottom)
    qd(v,[bx1,y0,bz0],[bx0,y0,bz0],[tx0,y1,tz0],[tx1,y1,tz0]);
    // Left wall
    qd(v,[bx0,y0,bz0],[bx0,y0,bz1],[tx0,y1,tz1],[tx0,y1,tz0]);
    // Right wall
    qd(v,[bx1,y0,bz1],[bx1,y0,bz0],[tx1,y1,tz0],[tx1,y1,tz1]);
    // Bottom cap (open — inlet face)
    // bottom inlet OPEN
    // Top cap (open — outlet face)
    // top outlet OPEN
    // Top straight (G)
    if(lG>0){
      qd(v,[tx0,y1,tz1],[tx1,y1,tz1],[tx1,y1+lG,tz1],[tx0,y1+lG,tz1]); // front
      qd(v,[tx0,y1+lG,tz0],[tx1,y1+lG,tz0],[tx1,y1,tz0],[tx0,y1,tz0]); // back
      qd(v,[tx0,y1,tz0],[tx0,y1,tz1],[tx0,y1+lG,tz1],[tx0,y1+lG,tz0]); // left
      qd(v,[tx1,y1+lG,tz0],[tx1,y1+lG,tz1],[tx1,y1,tz1],[tx1,y1,tz0]); // right
      // top cap OPEN — outlet
    }
  }
  else if(id==='ro'){
    // Vertical S-curve radius offset
    const H2=dv.H||8,EL=dv.E||32,lI=(dv.Di||2)*S,lO=(dv.Eo||2)*S;
    const steps=32;
    for(let i=0;i<steps;i++){
      const t0=i/steps,t1=(i+1)/steps;
      function sc(t){const s=t*t*(3-2*t);return[H2*S*s,EL*S*t];}
      function sp(t){const dt=.001;const[x0,y0]=sc(Math.max(0,t-dt));const[x1,y1]=sc(Math.min(1,t+dt));const tx=x1-x0,ty=y1-y0;const l=Math.sqrt(tx*tx+ty*ty)||1;return[-ty/l,tx/l];}
      const[x0,y0]=sc(t0),[x1,y1]=sc(t1);
      const hA0=(as/2*(1-t0)+(C||as/2)*S/2*t0),hB0=(bs/2*(1-t0)+(dv.Dp||bs/S/2)*S/2*t0);
      const hA1=(as/2*(1-t1)+(C||as/2)*S/2*t1),hB1=(bs/2*(1-t1)+(dv.Dp||bs/S/2)*S/2*t1);
      qd(v,[x0-hA0,-hB0,y0],[x0+hA0,-hB0,y0],[x1+hA1,-hB1,y1],[x1-hA1,-hB1,y1]);
      qd(v,[x0+hA0,hB0,y0],[x0-hA0,hB0,y0],[x1-hA1,hB1,y1],[x1+hA1,hB1,y1]);
      qd(v,[x0-hA0,hB0,y0],[x0-hA0,-hB0,y0],[x1-hA1,-hB1,y1],[x1-hA1,hB1,y1]);
      qd(v,[x0+hA0,-hB0,y0],[x0+hA0,hB0,y0],[x1+hA1,hB1,y1],[x1+hA1,-hB1,y1]);
    }
  }
  else if(id==='reo'){
    // Rect offset — parallelogram prism.
    // Inlet face at x=0: y=0..A, z=-hB..+hB
    // Outlet face at x=C: y=-F..A-F, z=-hB..+hB
    // The body has 6 faces: front, back, top, bottom, inlet cap, outlet cap
    const lD=D*S, lE=E*S, lC=C*S, lA=as, lF=F*S, hB=bs/2;
    const x0=0, x1=lC;
    // i = inlet corners: (x0, 0, ±hB) and (x0, lA, ±hB)
    // o = outlet corners: (x1, -lF, ±hB) and (x1, lA-lF, ±hB)
    // Front (z=+hB)
    qd(v,[x0,0,hB],[x1,-lF,hB],[x1,lA-lF,hB],[x0,lA,hB]);
    // Back (z=-hB)
    qd(v,[x0,lA,-hB],[x1,lA-lF,-hB],[x1,-lF,-hB],[x0,0,-hB]);
    // Bottom (y=0 at inlet, y=-lF at outlet)
    qd(v,[x0,0,hB],[x0,0,-hB],[x1,-lF,-hB],[x1,-lF,hB]);
    // Top (y=lA at inlet, y=lA-lF at outlet)
    qd(v,[x0,lA,-hB],[x0,lA,hB],[x1,lA-lF,hB],[x1,lA-lF,-hB]);
    // Inlet OPEN — no cap
    // Outlet OPEN — no cap
    // Left extension stub (D) — straight duct going left
    if(lD>0){
      qd(v,[-lD,0,hB],[x0,0,hB],[x0,0,-hB],[-lD,0,-hB]);
      qd(v,[-lD,lA,-hB],[x0,lA,-hB],[x0,lA,hB],[-lD,lA,hB]);
      // left stub end OPEN
      qd(v,[x0,0,hB],[-lD,0,hB],[-lD,lA,hB],[x0,lA,hB]);
      qd(v,[-lD,0,-hB],[-lD,lA,-hB],[x0,lA,-hB],[x0,0,-hB]);
    }
    // Right extension stub (E) — straight duct going right
    if(lE>0){
      const ox=x1+lE;
      qd(v,[x1,-lF,hB],[ox,-lF,hB],[ox,-lF,-hB],[x1,-lF,-hB]);
      qd(v,[x1,lA-lF,-hB],[ox,lA-lF,-hB],[ox,lA-lF,hB],[x1,lA-lF,hB]);
      // right stub end OPEN
      qd(v,[x1,-lF,hB],[x1,lA-lF,hB],[ox,lA-lF,hB],[ox,-lF,hB]);
      qd(v,[ox,-lF,-hB],[ox,lA-lF,-hB],[x1,lA-lF,-hB],[x1,-lF,-hB]);
    }
  }
    else if(id==='sqt'){
    // T-pipe tee: horizontal bar + vertical branch stem
    // A=width, B=depth (all sections same)
    // C=left arm length, D=right arm length
    // E=left arm height (Equal to A or custom Value)
    // F=right arm height (Equal to A or custom Value)
    // G=branch height above bar
    const hA=as/2, hB=bs/2;
    const lC=(dv.C||12)*S;
    const lD=(dv.D||12)*S;
    const eMode=Math.round(dv.E||0);
    const lEH=eMode===0?as:(dv.EV||12)*S;  // left arm height
    const fMode=Math.round(dv.F||0);
    const lFH=fMode===0?as:(dv.FV||12)*S;  // right arm height
    const lG=(dv.G||20)*S;                  // branch height
    const xL=-(hA+lC), xR=hA+lD;
    const yTop=as+lG;  // branch top = A + branch height

    // ── LEFT ARM (x=xL..-hA, height=lEH) ──
    qd(v,[xL,0,hB],[-hA,0,hB],[-hA,lEH,hB],[xL,lEH,hB]);       // front
    qd(v,[-hA,0,-hB],[xL,0,-hB],[xL,lEH,-hB],[-hA,lEH,-hB]);   // back
    qd(v,[xL,0,-hB],[xL,0,hB],[xL,lEH,hB],[xL,lEH,-hB]);        // left end OPEN
    qd(v,[xL,0,hB],[xL,0,-hB],[-hA,0,-hB],[-hA,0,hB]);          // bottom
    qd(v,[xL,lEH,-hB],[xL,lEH,hB],[-hA,lEH,hB],[-hA,lEH,-hB]); // top CLOSED
    // bridge if arm shorter than center body
    if(lEH<as){
      qd(v,[-hA,lEH,-hB],[-hA,lEH,hB],[-hA,as,hB],[-hA,as,-hB]);
    }

    // ── CENTER BODY + BRANCH (x=-hA..+hA, full height) ──
    qd(v,[-hA,0,hB],[hA,0,hB],[hA,yTop,hB],[-hA,yTop,hB]);       // front
    qd(v,[hA,0,-hB],[-hA,0,-hB],[-hA,yTop,-hB],[hA,yTop,-hB]);  // back
    qd(v,[-hA,0,-hB],[-hA,0,hB],[-hA,yTop,hB],[-hA,yTop,-hB]);  // left wall
    qd(v,[hA,0,hB],[hA,0,-hB],[hA,yTop,-hB],[hA,yTop,hB]);       // right wall
    qd(v,[-hA,0,-hB],[hA,0,-hB],[hA,0,hB],[-hA,0,hB]);           // bottom

    // ── RIGHT ARM (x=+hA..xR, height=lFH) ──
    qd(v,[hA,0,hB],[xR,0,hB],[xR,lFH,hB],[hA,lFH,hB]);          // front
    qd(v,[xR,0,-hB],[hA,0,-hB],[hA,lFH,-hB],[xR,lFH,-hB]);      // back
    qd(v,[xR,0,-hB],[xR,0,hB],[xR,lFH,hB],[xR,lFH,-hB]);        // right end OPEN
    qd(v,[hA,0,-hB],[xR,0,-hB],[xR,0,hB],[hA,0,hB]);            // bottom
    qd(v,[hA,lFH,-hB],[xR,lFH,-hB],[xR,lFH,hB],[hA,lFH,hB]);   // top CLOSED
    // bridge if arm shorter than center body
    if(lFH<as){
      qd(v,[hA,lFH,-hB],[hA,lFH,hB],[hA,as,hB],[hA,as,-hB]);
    }
  }
    else if(id==='sp'){
    // A=Btm Width, B=Btm Depth, C=Left Leg Width, D=Right Leg Width, F=Height, G=Throat
    const aS=A*S,bS=B*S,fS=F*S,gS=G*S,iS=3*S;
    const cS=(dv.C||12)*S, dS=(dv.D||12)*S;
    const taper=2*S;
    const xBL=-aS/2,xBR=aS/2;
    const xTL=-aS/2+taper,xTR=aS/2-taper;
    const xSL=xTL+cS, xSR=xTR-dS;
    const xVL=-gS/2, xVR=gS/2;
    const yB=0,yT=fS,yC=fS-taper,yV=fS-fS*0.38;
    const zF=-bS/2,zBk=bS/2;
    // 11-point profile
    const profile=[[xBL,yB],[xBR,yB],[xTR,yC],[xTR,yT],[xSR,yT],[xVR,yT],[0,yV],[xVL,yT],[xSL,yT],[xTL,yT],[xTL,yC]];
    // Open: bottom(0), flat top right of V(4), V right wall(5), V left wall(6), flat top left of V(7), left leg top(8)... 
    // Actually: only open the two leg tops (3→4 and 8→9) and bottom (0)
    // The V pocket walls (4→5→6→7→8) are CLOSED side walls
    // The flat horizontal tops between leg and V (4 and 7) are OPEN (no top cap)
    const openE=new Set([0,3,4,7,8]);
    const n2=profile.length;
    const P=(i)=>[profile[i][0],profile[i][1]];
    const f=(a,b,c,z,fw)=> fw ? tri(v,[P(a)[0],P(a)[1],z],[P(b)[0],P(b)[1],z],[P(c)[0],P(c)[1],z])
                               : tri(v,[P(a)[0],P(a)[1],z],[P(c)[0],P(c)[1],z],[P(b)[0],P(b)[1],z]);
    const drawFace=(z,fw)=>{
      // Right half: fan from pt 1 (bottom-right)
      f(1,2,3,z,fw); f(1,3,4,z,fw); f(1,4,5,z,fw); f(1,5,6,z,fw);
      // Left half: fan from pt 0 (bottom-left)
      f(0,6,7,z,fw); f(0,7,8,z,fw); f(0,8,9,z,fw); f(0,9,10,z,fw);
      // Centre bottom strip between pt0 and pt1 up to V-tip pt6
      f(0,1,6,z,fw);
    };
    drawFace(zF,true); drawFace(zBk,false);
    for(let i=0;i<n2;i++){
      if(openE.has(i))continue;
      const[ax,ay]=profile[i],[bx,by]=profile[(i+1)%n2];
      qd(v,[ax,ay,zF],[bx,by,zF],[bx,by,zBk],[ax,ay,zBk]);
    }
  }
  
  else if(id==='ec'){
    v=obox(-as/2,as/2,-bs/2,bs/2,-.02,.02,[]);
  }
  else if(id==='bc'){
    v=obox(-as/2,as/2,-C*S/2,C*S/2,-bs/2,bs/2,['top']); // top open (inlet), bot capped
  }
  else if(id==='fc'){
    // 6" long straight duct stub. A=preset dropdown, B=Width, C=Depth.
    // Open ends on the X axis (left/right), fixed at 3*S each side = 6" total.
    v = obox(-3*S, 3*S, -bs/2, bs/2, -cs/2, cs/2, ['left','right']);
  }
  else if(id==='stap'){
    v=obox(-cs/2,cs/2,-bs/2,bs/2,-as/2,as/2,['left','right','top']);
  }
  else if(id==='s2r'){
    // Square to Round: rect base (A×B) at y=0, tapers to circle (C dia) at y=lD
    // G=Collar cylinder above taper. Base open, collar top open.
    const hA=as/2, hB=bs/2;
    const r=(dv.C||10)*S/2;
    const lD=(dv.D||12)*S;
    const lG=(dv.G||4)*S;
    const steps=64;

    // Base corners in order: FR, FL, BL, BR (x+/-, z+/-)
    // CamDuct convention: each corner of the rectangle is the apex of a triangular fan,
    // and each flat side of the rectangle is connected to the corresponding arc quadrant.
    //
    // Corner angles (center of each quadrant, where the circle "points" to a corner):
    //   corner 0: (+hA, 0, -hB)  → angle  ~-45° = 315° = 7π/4  (front-right)
    //   corner 1: (+hA, 0, +hB)  → angle  ~+45° = 45°  = π/4   (back-right)
    //   corner 2: (-hA, 0, +hB)  → angle  ~135° = 3π/4          (back-left)
    //   corner 3: (-hA, 0, -hB)  → angle  ~225° = 5π/4          (front-left)
    //
    // For each arc step we figure out which base corner/edge it "belongs" to.
    // Arc angle θ=0 is +X direction. Going CCW.
    // Corner apex angles: 315, 45, 135, 225 degrees
    // Midpoints between corners: 0(360), 90, 180, 270 — these are where each
    // arc section transitions from one flat side to the next.

    // corners[i] = [x, z] of base corner i
    const corners = [
      [ hA, -hB],  // 0: right-front  (θ≈315°)
      [ hA,  hB],  // 1: right-back   (θ≈45°)
      [-hA,  hB],  // 2: left-back    (θ≈135°)
      [-hA, -hB],  // 3: left-front   (θ≈225°)
    ];
    // Each side connects corner[i] → corner[(i+1)%4]
    // Side i spans from corner[i] toward corner[(i+1)%4]:
    //   side 0: right side  (x=+hA), z: -hB → +hB, arc 315°→ 45°  (wrapping through 0°)
    //   side 1: back side   (z=+hB), x: +hA → -hA, arc  45°→135°
    //   side 2: left side   (x=-hA), z: +hB → -hB, arc 135°→225°
    //   side 3: front side  (z=-hB), x: -hA → +hA, arc 225°→315°
    //
    // We build each side's arc points, then for each step along the arc emit:
    //   - a triangle apex at the "start corner" (when transitioning corners)
    //   - a quad from two arc points to the interpolated base edge
    //
    // Simpler approach: for each arc segment, project the arc midpoint angle
    // to the nearest base edge, interpolate a point on that edge, and emit a
    // triangle (arc0, edge0, arc1) or quad if edge spans multiple steps.
    //
    // Cleanest approach matching CamDuct: for each arc step, the base point
    // is the intersection of the ray from center through the arc point projected
    // down to the rectangle boundary.

    function rectEdgePoint(ax, az) {
      // Given a direction (ax,az), find where it intersects the rectangle [-hA,hA]×[-hB,hB]
      if(ax===0 && az===0) return [0,0];
      const t1 = ax!==0 ? hA/Math.abs(ax) : Infinity;
      const t2 = az!==0 ? hB/Math.abs(az) : Infinity;
      const t = Math.min(t1,t2);
      return [ax*t, az*t];
    }

    for(let i=0;i<steps;i++){
      const a0 = i/steps*Math.PI*2;
      const a1 = (i+1)/steps*Math.PI*2;
      const cx0=Math.cos(a0), cz0=Math.sin(a0);
      const cx1=Math.cos(a1), cz1=Math.sin(a1);
      // Circle points at top of taper
      const p0=[cx0*r, lD, cz0*r];
      const p1=[cx1*r, lD, cz1*r];
      // Corresponding base edge points (projected onto rect boundary)
      const [bx0,bz0]=rectEdgePoint(cx0,cz0);
      const [bx1,bz1]=rectEdgePoint(cx1,cz1);
      const b0=[bx0, 0, bz0];
      const b1=[bx1, 0, bz1];
      // If b0≈b1 (same corner), emit triangle; otherwise emit quad
      const dx=Math.abs(bx0-bx1), dz=Math.abs(bz0-bz1);
      if(dx<1e-6 && dz<1e-6){
        tri(v, p0, b0, p1);
      } else {
        qd(v, p0, b0, b1, p1);
      }
    }

    // Also add the 4 flat triangular corner faces: from each corner to its two
    // adjacent arc end-points. These fill the "gusset" between the projected
    // edge hits and the actual corners.
    // Actually the rectEdgePoint approach already handles this correctly —
    // near corners the b0 and b1 will coincide at the corner → triangles.

    // Collar cylinder (y=lD to y=lD+lG)
    for(let i=0;i<steps;i++){
      const a0=i/steps*Math.PI*2, a1=(i+1)/steps*Math.PI*2;
      qd(v,
        [Math.cos(a0)*r, lD,    Math.sin(a0)*r],
        [Math.cos(a1)*r, lD,    Math.sin(a1)*r],
        [Math.cos(a1)*r, lD+lG, Math.sin(a1)*r],
        [Math.cos(a0)*r, lD+lG, Math.sin(a0)*r]
      );
    }
    // Base rect sides (4 walls from base edge to... wait — base is the INLET, open)
    // Base is open (hollow rule). Collar top is open.
  }
  else if(id==='rd'){
    v=obox(-as/2,as/2,-bs/2,bs/2,-.01,.01,[]);
    qd(v,[as/2,bs/2,.01],[as/2+1.5*S,bs/2,.01],[as/2+1.5*S,-bs/2,.01],[as/2,-bs/2,.01]);
  }
  else{
    v=obox(-as/2,as/2,-bs/2,bs/2,-.5*S,.5*S,[]);
  }
  return v;
}

function gv(id){const e=document.getElementById('d_'+id);if(!e)return 0;if(e.tagName==='SELECT')return parseInt(e.value)||0;return Math.max(0,parseFloat(e.value)||0);}
function getDims(){
  const f=DB.find(x=>x.id===curFit);if(!f)return{};
  const d={};f.dims.forEach(x=>d[x.id]=gv(x.id));return d;
}

function sqtSyncArms(changedEl){
  // Only sync C and D from A when A itself is being changed
  if(curFit!=='sqt') return;
  if(!changedEl||changedEl.id!=='d_A') return;
  const aVal=parseFloat(changedEl.value)||0;
  const eC=document.getElementById('d_C');
  const eD=document.getElementById('d_D');
  if(eC) eC.value=aVal;
  if(eD) eD.value=aVal;
}
function autoCD(){} // kept for compatibility

function fcSyncPreset(){
  if(curFit!=='fc') return;
  const sel=document.getElementById('d_A'); if(!sel) return;
  const v=parseInt(sel.value)||0;
  const presets=[[3,3],[4,4],[12,8]];
  const [pw,pd]=presets[v]||presets[0];
  const bEl=document.getElementById('d_B'), cEl=document.getElementById('d_C');
  if(bEl) bEl.value=pw;
  if(cEl) cEl.value=pd;
}
function autoG(){
  const f=DB.find(x=>x.id===curFit);if(!f||!f.autoG)return;
  const el=document.getElementById('d_G');
  if(el) el.value=(curVar==='lr'?gv('A')*1.5:gv('A')*.5).toFixed(1);
}
function redraw(){
  if(!curFit) return;
  const dv=getDims();
  const v=buildFitting(curFit,curVar,dv);
  uploadGeom(v);
  // Better default angles for specific fittings
  if(curFit==='reo'){rX=0.9;rY=0.3;}
  if(curFit==='tr'){rX=0.5;rY=0.8;}
  // Compute labels for this fitting
  curLabels=getFittingLabels(curFit,curVar,dv);
}

function getFittingLabels(id,variant,dv){
  const S=1/12;
  const bb=window.geoBB;
  if(!bb) return [];
  const {x0,x1,y0,y1,z0,z1,cx,cy,cz}=bb;
  const pad=camR*0.08; // label standoff = 8% of camera distance
  const L=(text,ax,ay,az,lx,ly,lz)=>({text,ax,ay,az,lx,ly,lz});

  // Helper: place label at a face of the bounding box
  // face: 'right','left','top','bot','front','back'
  // t: 0..1 position along that face
  const face=(text,f,tx,ty)=>{
    // anchor on face, label offset outward
    if(f==='right') return L(text, x1,    cy+(y1-y0)*(ty-0.5), cz+(z1-z0)*(tx-0.5),
                                         x1+pad, cy+(y1-y0)*(ty-0.5), cz+(z1-z0)*(tx-0.5));
    if(f==='left')  return L(text, x0,    cy+(y1-y0)*(ty-0.5), cz+(z1-z0)*(tx-0.5),
                                         x0-pad, cy+(y1-y0)*(ty-0.5), cz+(z1-z0)*(tx-0.5));
    if(f==='top')   return L(text, cx+(x1-x0)*(tx-0.5), y1, cz+(z1-z0)*(ty-0.5),
                                         cx+(x1-x0)*(tx-0.5), y1+pad, cz+(z1-z0)*(ty-0.5));
    if(f==='bot')   return L(text, cx+(x1-x0)*(tx-0.5), y0, cz+(z1-z0)*(ty-0.5),
                                         cx+(x1-x0)*(tx-0.5), y0-pad, cz+(z1-z0)*(ty-0.5));
    if(f==='front') return L(text, cx+(x1-x0)*(tx-0.5), cy+(y1-y0)*(ty-0.5), z1,
                                         cx+(x1-x0)*(tx-0.5), cy+(y1-y0)*(ty-0.5), z1+pad);
    if(f==='back')  return L(text, cx+(x1-x0)*(tx-0.5), cy+(y1-y0)*(ty-0.5), z0,
                                         cx+(x1-x0)*(tx-0.5), cy+(y1-y0)*(ty-0.5), z0-pad);
  };

  const A=(dv.A||24), B=(dv.B||12), C=(dv.C||0);

  if(id==='st')   return [face('A: '+A+'"','top',0.5,0.5), face('B: '+B+'"','front',0.5,0.5), face('C: '+(dv.C||48)+'"','right',0.5,0.5)];
  if(id==='ec')   return [face('A: '+A+'"','right',0.5,0.5), face('B: '+B+'"','front',0.5,0.5)];
  if(id==='fc'){const sn=['3x3x3','4x4x4','Junior'][dv.A||0]||'3x3x3'; return [face(sn,'front',0.5,0.5), face('W: '+(dv.B||'')+'"','right',0.5,0.5), face('D: '+(dv.C||'')+'"','top',0.5,0.5)];}
  if(id==='rd')   return [face('A: '+A+'"','right',0.5,0.5), face('B: '+B+'"','front',0.5,0.5)];
  if(id==='bc')   return [face('A: '+A+'"','right',0.5,0.5), face('B: '+B+'"','front',0.5,0.5)];
  if(id==='s2r')  return [face('A: '+A+'"','right',0.5,0.5), face('B: '+B+'"','front',0.5,0.5)];
  if(id==='stap') return [face('A: '+A+'"','top',0.5,0.3), face('C: '+(dv.C||12)+'"','top',0.5,0.7)];
  if(id==='sqe')  return [face('A: '+A+'"','left',0.5,0.5), face('B: '+B+'"','front',0.5,0.5), face('D: '+(dv.D||12)+'"','left',0.5,0.2), face('E: '+(dv.E||12)+'"','left',0.2,0.5)];
  if(id==='reo')  return [face('A: '+A+'"','right',0.5,0.5), face('B: '+B+'"','front',0.5,0.5), face('C: '+(dv.C||40)+'"','top',0.5,0.5), face('F: '+(dv.F||12)+'"','right',0.5,0.2)];
  if(id==='sqt'){
    const hA2=(dv.A||12)*S/2, hB2=(dv.B||12)*S/2;
    const lC2=(dv.C||12)*S, lD2=(dv.D||12)*S;
    const lE2=(dv.E||6)*S, lF2=(dv.F||6)*S, lG2=(dv.G||6)*S;
    const xL2=-(hA2+lC2), xR2=hA2+lD2;
    const yBar2=(dv.A||12)*S;
    const yTop2=yBar2*2;
    const p=camR*0.09;
    return [
      L('A: '+dv.A+'"',   0,        yBar2/2,   0,      0,         yBar2/2-p,  0),
      L('B: '+dv.B+'"',   0,        yBar2/2,   hB2,    0,         yBar2/2,    hB2+p),
      L('C: '+dv.C+'"',   xL2,      yBar2/2,   0,      xL2-p,     yBar2/2,    0),
      L('D: '+dv.D+'"',   xR2,      yBar2/2,   0,      xR2+p,     yBar2/2,    0),
      L('E: '+dv.E+'"',   xL2+lC2/2, yBar2+p,  0,      xL2+lC2/2, yBar2+p*2, 0),
      L('F: '+dv.F+'"',   xR2-lD2/2, yBar2+p,  0,      xR2-lD2/2, yBar2+p*2, 0),
      L('G: '+dv.G+'"',   hA2,      yBar2+p,   0,      hA2+p,     yBar2+p*2,  0),
    ];
  }
  if(id==='sp')   return [face('A: '+A+'"','bot',0.5,0.5), face('B: '+B+'"','front',0.5,0.5), face('Left','left',0.5,0.5), face('Right','right',0.5,0.5)];
  if(id==='tr')   return [face('A: '+A+'"','bot',0.5,0.5), face('B: '+B+'"','front',0.7,0.5), face('C: '+(dv.C||20)+'"','top',0.5,0.5), face('D: '+(dv.Dp||10)+'"','front',0.3,0.5), face('E: '+(dv.E||16)+'"','right',0.5,0.5)];
  if(id==='e90'||id==='e45'||id==='ev'){
    return [
      face('A: '+A+'"',  'front', 0.3, 0.3),
      face('B: '+B+'"',  'front', 0.5, 0.5),
      face('D: '+(dv.D||90)+'°', 'front', 0.7, 0.3),
      face('E: '+(dv.E||0)+'"',  'left',  0.5, 0.7),
      face('F: '+(dv.F||0)+'"',  'bot',   0.5, 0.5),
      face('G: '+(dv.G||12)+'"', 'front', 0.5, 0.7),
    ];
  }
  if(id==='rgn'){
    return [
      face('A: '+A+'"',  'front', 0.3, 0.3),
      face('B: '+B+'"',  'front', 0.5, 0.5),
      face('D: '+(dv.D||135)+'°', 'front', 0.7, 0.3),
      face('E: '+(dv.E||0)+'"',  'bot',   0.5, 0.5),
      face('G: '+(dv.G||12)+'"', 'front', 0.5, 0.7),
    ];
  }
  return [];
}

// ── MOBILE UI ────────────────────────────────────────────────────────

let listItems=[];
let curFit=null, curVar=null;

// ── NAVIGATION ──────────────────────────────────────────────────────
function goToDetail(id){
  document.getElementById('palletScreen').classList.add('slide-out');
  document.getElementById('detailScreen').classList.add('slide-in');
  // Resize canvas after screen is visible, then select fitting
  requestAnimationFrame(() => {
    const vp2 = document.getElementById('vp');
    cv.width = vp2.clientWidth; cv.height = vp2.clientHeight;
    if(!gl) initGL();
    if(gl) { gl.viewport(0,0,cv.width,cv.height); }
    selFit(id);
  });
}
function goBack(){
  editingIndex = -1;
  if(btnResetTimer){ clearTimeout(btnResetTimer); btnResetTimer = null; }
  syncBtn();
  document.getElementById('palletScreen').classList.remove('slide-out');
  document.getElementById('detailScreen').classList.remove('slide-in');
}

// ── LIST OVERLAY ─────────────────────────────────────────────────────
function openList(){ document.getElementById('listOverlay').classList.add('open'); }
function closeList(){ document.getElementById('listOverlay').classList.remove('open'); }
function closeListIfBg(e){ if(e.target===document.getElementById('listOverlay')) closeList(); }

// ── BUILD PALLET ─────────────────────────────────────────────────────
function buildPallet(){
  const pal = document.getElementById('pallet');
  DB.forEach(f => {
    const el = document.createElement('div');
    el.className = 'pi';
    el.dataset.id = f.id;
    const img = f.iconData
      ? `<img src="${f.iconData}" alt="${f.n}">`
      : `<div class="pimg-placeholder"></div>`;
    el.innerHTML = `${img}<div class="pname">${f.n}</div>`;
    el.onclick = () => goToDetail(f.id);
    pal.appendChild(el);
  });
}

// ── SELECT FITTING ───────────────────────────────────────────────────
function selFit(id){
  curFit = id;
  const f = DB.find(x => x.id === id);
  curVar = null;
  document.getElementById('vpName').textContent = f.n;
  document.getElementById('vpLabel').textContent = f.n;

  // Variant buttons
  const vt = document.getElementById('vtabs');
  vt.innerHTML = '';
  if(f.vars && f.vars.length){
    f.vars.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'vt-btn';
      btn.textContent = v.l;
      btn.onclick = () => {
        vt.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('on'));
        const wasOn = curVar === v.id;
        curVar = wasOn ? null : v.id;
        if(!wasOn) btn.classList.add('on');
        autoG(); redraw();
      };
      vt.appendChild(btn);
    });
  }

  // Dims
  const dg = document.getElementById('dgrid');
  dg.innerHTML = '';
  f.dims.forEach(d => {
    const div = document.createElement('div');
    div.className = 'df';
    if(d.sel){
      const opts = d.sel.map((o,i) => `<option value="${i}"${i===d.v?' selected':''}>${o}</option>`).join('');
      const selChange = d.id==='A' && curFit==='fc' ? 'fcSyncPreset();redraw()' : 'redraw()';
      div.innerHTML = `<label>${d.l}</label><select id="d_${d.id}" onchange="${selChange}">${opts}</select>`;
    } else {
      div.innerHTML = `<label>${d.l}</label><input type="number" id="d_${d.id}" value="${d.v}" min="0" step="0.5" oninput="autoG();sqtSyncArms(this);redraw()">`;
    }
    dg.appendChild(div);
  });

  autoG(); redraw();
  syncBtn();
}

function syncBtn(){
  const btn = document.getElementById('btnAdd');
  if(!btn) return;
  if(editingIndex >= 0){
    btn.textContent = '💾 Save Changes';
    btn.style.background = '#e07b00';
  } else {
    btn.textContent = '+ Add to List';
    btn.style.background = 'var(--teal)';
  }
}

// ── ADD ITEM ──────────────────────────────────────────────────────────
function addItem(){
  if(!curFit){ alert('Select a fitting first'); return; }
  const f = DB.find(x => x.id === curFit);
  const d = getDims(), qty = +document.getElementById('iQty').value || 1;
  const notes = document.getElementById('iNotes').value;
  const vl = curVar ? (f.vars.find(v => v.id === curVar)||{}).l : '';
  let thumb = null;
  try { thumb = document.getElementById('cv3d').toDataURL('image/jpeg', 0.6); } catch(e){}
  const entry = {id: curFit, var: curVar, n: f.n + (vl ? ' (' + vl + ')' : ''), d, qty, notes, thumb};
  const btn = document.getElementById('btnAdd');
  if(editingIndex >= 0){
    // Save changes to existing item
    listItems[editingIndex] = entry;
    editingIndex = -1;
    renderList();
    btn.textContent = '✓ Saved!';
    btn.style.background = '#1a6e52';
    setTimeout(() => { btn.textContent = '+ Add to List'; btn.style.background = 'var(--teal)'; }, 1200);
  } else {
    // Add new item
    listItems.push(entry);
    renderList();
    btn.textContent = '✓ Added!';
    btn.style.background = '#1a6e52';
    setTimeout(() => { btn.textContent = '+ Add to List'; btn.style.background = 'var(--teal)'; }, 1200);
  }
}

// ── EDIT ITEM ──────────────────────────────────────────────────────────
let editingIndex = -1; // -1 = new item, >=0 = editing existing
let btnResetTimer = null;

function editItem(i){
  const it = listItems[i];
  editingIndex = i;
  closeList();
  document.getElementById('palletScreen').classList.add('slide-out');
  document.getElementById('detailScreen').classList.add('slide-in');
  requestAnimationFrame(() => {
    const vp2 = document.getElementById('vp');
    cv.width = vp2.clientWidth; cv.height = vp2.clientHeight;
    if(!gl) initGL();
    if(gl) gl.viewport(0, 0, cv.width, cv.height);
    selFit(it.id);
    // Restore saved dims
    Object.entries(it.d).forEach(([k, v]) => {
      const el = document.getElementById('d_' + k);
      if(el) el.value = v;
    });
    // Restore variant
    if(it.var){
      curVar = it.var;
      document.querySelectorAll('.vt-btn').forEach(b => {
        const f = DB.find(x => x.id === it.id);
        const vObj = f && f.vars.find(v => v.l === b.textContent);
        if(vObj && vObj.id === it.var) b.classList.add('on');
      });
    }
    document.getElementById('iQty').value = it.qty;
    document.getElementById('iNotes').value = it.notes || '';
    redraw();
    syncBtn();
  });
}

// ── RENDER LIST ───────────────────────────────────────────────────────
function renderList(){
  const n = listItems.length;
  ['lCount','lCount2','lCount3'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.textContent = n;
  });
  const el = document.getElementById('listArea');
  if(!n){ el.innerHTML = '<div class="empty-msg">No items yet</div>'; return; }
  el.innerHTML = listItems.map((it,i) => `
    <div class="li" onclick="editItem(${i})">
      <button class="lr" onclick="event.stopPropagation();listItems.splice(${i},1);renderList()">×</button>
      ${it.thumb ? `<img class="li-thumb" src="${it.thumb}" alt="">` : '<div class="li-thumb-ph"></div>'}
      <div class="li-body">
        <div class="ln">${it.qty}× ${it.n}</div>
        <div class="ld">${Object.entries(it.d).filter(([k])=>!['CN1','CN2','CN3','LN'].includes(k)).map(([k,v])=>`${k}=${v}"`).join(' ')}${it.notes?' · '+it.notes:''}</div>
      </div>
    </div>`).join('');
}

// ── COPY / PDF ────────────────────────────────────────────────────────
function copyList(){
  if(!listItems.length){ alert('No items'); return; }
  const j = n => document.getElementById(n).value || '';
  let t = `HVAC TAKEOFF — ${j('jName')}\nTech: ${j('jTech')}  Date: ${j('jDate')}  Zone: ${j('jZone')}\n${'─'.repeat(50)}\n`;
  listItems.forEach((it,i) => {
    t += `${i+1}. ${it.qty}× ${it.n}\n   ${Object.entries(it.d).map(([k,v])=>`${k}=${v}"`).join('  ')}\n`;
    if(it.notes) t += `   Notes: ${it.notes}\n`;
  });
  t += `${'─'.repeat(50)}\nTotal: ${listItems.length} items`;
  navigator.clipboard.writeText(t).then(() => alert('Copied!')).catch(() => alert('Copy failed'));
}

// ── EXPORT PDF ────────────────────────────────────────────────────────
function exportPDF(){
  if(!listItems.length){ alert('No items'); return; }
  if(typeof window.jspdf==='undefined'){ alert('PDF still loading, try again'); return; }
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'letter'});
  const j=n=>document.getElementById(n).value||'';
  let y=40;
  doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('HVAC Field Takeoff — Brookstone Industries',40,y);y+=20;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100);
  doc.text(`Job: ${j('jName')}  |  Tech: ${j('jTech')}  |  Date: ${j('jDate')}  |  Zone: ${j('jZone')}`,40,y);y+=14;
  doc.setDrawColor(180);doc.line(40,y,570,y);y+=10;
  doc.setTextColor(30);doc.setFont('helvetica','bold');
  ['#','Fitting','Qty','Dimensions','Notes'].forEach((h,i)=>doc.text(h,[40,60,100,140,400][i],y));
  y+=4;doc.line(40,y,570,y);y+=8;
  doc.setFont('helvetica','normal');
  listItems.forEach((it,i)=>{
    if(y>690){doc.addPage();y=40;}
    const ds=Object.entries(it.d).map(([k,v])=>`${k}=${v}"`).join(' ');
    doc.text(String(i+1),40,y);
    doc.text(it.n,60,y);
    doc.text(String(it.qty),100,y);
    doc.text(doc.splitTextToSize(ds,255),140,y);
    doc.text(it.notes||'',400,y);
    y+=14;doc.setDrawColor(220);doc.line(40,y,570,y);y+=5;
  });
  y+=6;doc.setFont('helvetica','bold');doc.text(`Total: ${listItems.length} items`,40,y);
  doc.save(`takeoff_${j('jName').replace(/\s+/g,'_')||'job'}_${new Date().toISOString().slice(0,10)}.pdf`);
}


// ── SEND MODAL ────────────────────────────────────────────────────────
let attachedPhotos = []; // [{name, dataUrl}]

function openSend(){
  closeList();
  document.getElementById('sendModal').classList.add('open');
}
function closeSend(){ document.getElementById('sendModal').classList.remove('open'); }
function closeSendIfBg(e){ if(e.target===document.getElementById('sendModal')) closeSend(); }

function handlePhotos(input){
  const files = Array.from(input.files);
  const thumbRow = document.getElementById('photoThumbs');
  const prompt = document.getElementById('photoPrompt');
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      attachedPhotos.push({name: file.name, dataUrl: e.target.result});
      renderPhotoThumbs();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('photoArea').classList.add('has-photo');
  prompt.style.display = 'none';
}

function removePhoto(i){
  attachedPhotos.splice(i, 1);
  if(!attachedPhotos.length){
    document.getElementById('photoArea').classList.remove('has-photo');
    document.getElementById('photoPrompt').style.display = '';
  }
  renderPhotoThumbs();
}

function renderPhotoThumbs(){
  const row = document.getElementById('photoThumbs');
  row.innerHTML = attachedPhotos.map((p,i) => `
    <div class="photo-rm">
      <img class="photo-thumb" src="${p.dataUrl}" alt="photo ${i+1}">
      <button class="photo-rm-btn" onclick="removePhoto(${i})">×</button>
    </div>`).join('');
}

function buildHTMLReport(){
  // Build a self-contained HTML file with all renderings, dims, and job info
  const j = n => document.getElementById(n)?.value || '';
  let rows = listItems.map((it,i) => {
    const dimStr = Object.entries(it.d)
      .map(([k,v]) => `<span style="margin-right:6px"><b>${k}:</b> ${v}"</span>`)
      .join('');
    const thumb = it.thumb
      ? `<img src="${it.thumb}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;background:#1c2b3a">`
      : '<div style="width:80px;height:80px;background:#eee;border-radius:6px"></div>';
    return `<tr style="border-bottom:1px solid #eee">
      <td style="padding:10px 8px;color:#888;font-size:13px">${i+1}</td>
      <td style="padding:10px 8px">${thumb}</td>
      <td style="padding:10px 8px"><b style="font-size:14px">${it.qty}× ${it.n}</b><br><span style="font-size:12px;color:#666">${dimStr}</span>${it.notes?`<br><span style="font-size:11px;color:#999">📝 ${it.notes}</span>`:''}</td>
    </tr>`;
  }).join('');

  const photoSection = attachedPhotos.length
    ? `<h3 style="margin:24px 0 10px;color:#333">Handwritten List</h3>
       <div style="display:flex;flex-wrap:wrap;gap:10px">
         ${attachedPhotos.map(p=>`<img src="${p.dataUrl}" style="max-width:320px;border-radius:8px;border:1px solid #ddd">`).join('')}
       </div>` : '';

  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>HVAC Takeoff — ${j('jName')}</title>
    <style>body{font-family:-apple-system,sans-serif;max-width:800px;margin:0 auto;padding:20px;color:#222}
    table{width:100%;border-collapse:collapse}th{text-align:left;padding:8px;background:#f5f5f5;font-size:12px;text-transform:uppercase;color:#888}
    </style></head><body>
    <div style="background:#2BA87E;color:#fff;padding:16px 20px;border-radius:10px;margin-bottom:20px">
      <h1 style="margin:0;font-size:20px">HVAC Field Takeoff</h1>
      <p style="margin:4px 0 0;opacity:.85;font-size:13px">Brookstone Industries</p>
    </div>
    <table style="width:100%;font-size:13px;margin-bottom:12px">
      <tr><td><b>Job:</b> ${j('jName')}</td><td><b>Tech:</b> ${j('jTech')}</td></tr>
      <tr><td><b>Date:</b> ${j('jDate')}</td><td><b>Zone:</b> ${j('jZone')}</td></tr>
    </table>
    <table><thead><tr><th>#</th><th>View</th><th>Item</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <p style="margin-top:16px;color:#888;font-size:12px">Total: ${listItems.length} items</p>
    ${photoSection}
    </body></html>`;
}

function doSend(){
  if(!listItems.length && !attachedPhotos.length){
    alert('Add some items or attach a photo first.');
    return;
  }
  const jv = function(n){ var el=document.getElementById(n); return el?el.value:''; };
  const cc = document.getElementById('sendCC').value.trim();
  const msg = document.getElementById('sendMsg').value.trim();
  const jobName = jv('jName') || 'Takeoff';

  const htmlReport = buildHTMLReport();
  const blob = new Blob([htmlReport], {type:'text/html'});
  const reportUrl = URL.createObjectURL(blob);

  let mailto = 'mailto:sales@brookstoneind.com';
  const params = [];
  if(cc) params.push('cc=' + encodeURIComponent(cc));
  params.push('subject=' + encodeURIComponent('HVAC Takeoff \u2014 ' + jobName + ' \u2014 ' + jv('jTech')));
  let body = 'Hi Brookstone team,\n\nPlease find the attached HVAC takeoff list.\n\n';
  body += 'Job: ' + jobName + '\n';
  body += 'Tech: ' + jv('jTech') + '\n';
  body += 'Date: ' + jv('jDate') + '\n';
  body += 'Zone: ' + jv('jZone') + '\n';
  body += 'Items: ' + listItems.length + '\n';
  if(msg) body += 'Notes: ' + msg + '\n';
  body += '\nList:\n' + listItems.map(function(it,i){ return (i+1)+'. '+it.qty+'x '+it.n; }).join('\n');
  body += '\n\n(Full rendered list attached as HTML file)';
  params.push('body=' + encodeURIComponent(body));
  if(params.length) mailto += '?' + params.join('&');

  const a = document.createElement('a');
  a.href = reportUrl;
  a.download = 'takeoff_' + jobName.replace(/\s+/g,'_') + '_' + (jv('jDate')||'today') + '.html';
  a.click();

  setTimeout(function(){ window.location.href = mailto; closeSend(); }, 800);
  setTimeout(function(){ alert('Your takeoff report downloaded.\n\nAttach it to the email that just opened.'); }, 1400);
}


// ── TOUCH CONTROLS ─────────────────────────────────────────────────────
let pinchDist=null;

cv.addEventListener('mousedown', e => { drag=true; mx=e.clientX; my=e.clientY; });
window.addEventListener('mouseup', () => { drag=false; });
window.addEventListener('mousemove', e => {
  if(!drag) return;
  rY -= (e.clientX - mx) * .013; rX += (e.clientY - my) * .013;
  rX = Math.max(-1.3, Math.min(1.3, rX));
  mx = e.clientX; my = e.clientY;
});
cv.addEventListener('wheel', e => { camR *= e.deltaY > 0 ? 1.1 : .91; e.preventDefault(); }, {passive:false});

// Single touch = rotate
let lastTouch = null;
cv.addEventListener('touchstart', e => {
  if(e.touches.length === 1){ lastTouch = e.touches[0]; pinchDist = null; }
  else if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx + dy*dy);
    lastTouch = null;
  }
}, {passive:true});

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length === 1 && lastTouch){
    const t = e.touches[0];
    rY -= (t.clientX - lastTouch.clientX) * .015;
    rX += (t.clientY - lastTouch.clientY) * .015;
    rX = Math.max(-1.3, Math.min(1.3, rX));
    lastTouch = t;
  } else if(e.touches.length === 2 && pinchDist !== null){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    camR *= pinchDist / dist;
    pinchDist = dist;
  }
}, {passive:false});

window.addEventListener('resize', () => {
  const vp2 = document.getElementById('vp');
  cv.width = vp2.clientWidth; cv.height = vp2.clientHeight;
  if(gl) gl.viewport(0, 0, cv.width, cv.height);
});

document.getElementById('jDate').valueAsDate = new Date();
buildPallet();
renderList();
window.addEventListener('load', () => {
  initGL();
});
